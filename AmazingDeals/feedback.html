<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>JWO Connect</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>
    <body onload="addCoupons()">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">JWO Connect (Madison Square)</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Promotions</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="coupons.html">Coupons</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://justwalkout.com/receipts">Receipts</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="feedback.html">Feedback</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#subscribeModal">Subscribe</a>
                        </li>
                    </ul>
                    <form class="d-flex">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>

        <form class="align-middle">
            <div class="mb-3">
                <label for="comment">Rating:</label>
                <div class="radio">
                    <label><input type="radio" name="optradio" checked>1</label>
                    <label><input type="radio" name="optradio" checked>2</label>
                    <label><input type="radio" name="optradio" checked>3</label>
                    <label><input type="radio" name="optradio" checked>4</label>
                    <label><input type="radio" name="optradio" checked>5</label>
                </div>
            </div>
            <div class="mb-3">
                <label for="comment">Feedback:</label>
                <textarea class="form-control" rows="5" id="feedbackInput"></textarea>
            </div>


            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="feedbackT&C">
                <label class="form-check-label" for="feedbackT&C">I Agree to the Terms and Conditions</label>
            </div>
            <button type="submit" class="btn btn-primary">Submit Feedback</button>
        </form>

        <!-- Subscription Modal -->
        <div class="modal fade" id="subscribeModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Subscribe!</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="form-group">
                                <label for="subscribeInputEmail">Email address</label>
                                <input type="email" class="form-control" id="subscribeInputEmail" placeholder="Enter email">
                            </div>
                            <div class="form-group">
                                <label for="subscribeInputPhone">Phone Number</label>
                                <input type="tel" class="form-control" id="subscribeInputPhone" placeholder="Enter Phone number">
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="subscribeT&C">
                                <label class="form-check-label" for="subscribeT&C">I Agree to the Terms and Conditions</label>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Subscribe</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <script type="application/javascript" src="jquery-3.7.1.min.js"></script>

        <script>
            function addCoupons() {

            }
        </script>
    </body>
</html>
